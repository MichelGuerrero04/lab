services:

  # PostgreSQL 16 + PostGIS + esquema 3DCityDB 5.x preinstalado
  # SRID 32118 = NAD83 / New York Long Island (coordenadas del dataset NYC)
  citydb:
    image: 3dcitydb/3dcitydb-pg:5.1.3-alpine
    environment:
      SRID: 32118
      SRS_NAME: "urn:ogc:def:crs:EPSG::32118"
      POSTGRES_DB: laboratorio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - citydb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laboratorio"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GeoServer — publica capas PostGIS como WMS/WFS
  geoserver:
    image: kartoza/geoserver:2.25.2
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
      GEOSERVER_CORS_ENABLED: "true"
      GEOSERVER_CORS_ALLOWED_ORIGINS: "*"
      INITIAL_MEMORY: 512m
      MAXIMUM_MEMORY: 1g
    ports:
      - "8080:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
    depends_on:
      citydb:
        condition: service_healthy

  # nginx — sirve el visor Cesium + archivos estaticos (incluye /tiles/lod2 para 3D Tiles LoD2)
  cesium-viewer:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
    depends_on:
      - geoserver

  # pg2b3dm — genera 3D Tiles LoD2 desde PostGIS
  # Zona de estudio: bbox 308000-309500 x 60500-62000 (EPSG:32118) = ~1597 edificios
  # Ejecutar: docker compose run --rm pg2b3dm-converter
  # Resultado: ./web/tiles/lod2/tileset.json + content/*.glb (servido por cesium-viewer en /tiles/lod2/)
  pg2b3dm-converter:
    image: geodan/pg2b3dm
    profiles: [tools]
    volumes:
      - ./web/tiles/lod2:/output
    command: >
      --connection "Host=citydb;Port=5432;Database=laboratorio;Username=postgres;Password=postgres;CommandTimeout=300"
      -t public.v_lod2_buildings_3dtiles
      -c geom
      -o /output
      --max_features_per_tile 500
      -g 200
    depends_on:
      citydb:
        condition: service_healthy

volumes:
  citydb_data:
  geoserver_data:
